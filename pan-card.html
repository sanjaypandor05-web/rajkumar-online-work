<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAN Card Service | Rajkumar Online Work</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<header class="header">

    <div class="logo">
        <h2>Rajkumar Online Work</h2>
    </div>

    <a href="index.html" class="btn">
        ← Back
    </a>

</header>

<section class="service-page">

    <h1>Apply for PAN Card</h1>

    <p>
        Fill the details below and upload your documents.
        We will process your PAN Card request quickly.
    </p>

    <form id="panForm">

        <input type="text"
        id="name"
        placeholder="Full Name"
        required>

        <input type="tel"
        id="mobile"
        placeholder="Mobile Number"
        required>

        <input type="email"
        id="email"
        placeholder="Email Address">

        <select id="service">

            <option>New PAN Card</option>

            <option>PAN Correction</option>

            <option>PAN Reprint</option>

        </select>        <label>Upload Aadhaar Card</label>
        <input type="file" accept=".jpg,.jpeg,.png,.pdf">

        <label>Upload Passport Photo</label>
        <input type="file" accept=".jpg,.jpeg,.png">

        <label>Upload Signature</label>
        <input type="file" accept=".jpg,.jpeg,.png">

        <textarea
            id="address"
            placeholder="Full Address"
            rows="4"></textarea>

        <button type="submit" class="btn">
            Submit PAN Card Request
        </button>

    </form>

</section>

<script>
document.getElementById("panForm").addEventListener("submit", function(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let service = document.getElementById("service").value;

    let msg =
`PAN Card Request

Name: ${name}
Mobile: ${mobile}
Service: ${service}`;

    window.open(
      "https://wa.me/919429193151?text=" + encodeURIComponent(msg),
      "_blank"
    );
});
</script>

</body>
</html>
